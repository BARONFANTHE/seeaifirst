<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Ecosystem Mindmap 2026</title>
<meta name="description" content="Mindmap tổng hợp AI trends 2026: MCP, A2A protocols, Claude-Flow, AI Coding Agents, Skills ecosystem, Agent frameworks, Memory systems và xu hướng mới nhất.">
<meta name="author" content="Baron">
<meta name="robots" content="index, follow">
<meta property="og:type" content="website">
<meta property="og:title" content="AI Ecosystem Mindmap 2026">
<meta property="og:description" content="Tổng hợp Protocols, Frameworks, Agents, Memory, Skills, Coding Tools & Trends">
<meta property="og:locale" content="vi_VN">
<meta name="twitter:card" content="summary_large_image">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🧠</text></svg>">
<meta name="theme-color" content="#07090f">
<style>
@import url('https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#07090f;--bg2:#0d1117;--surface:#131a2b;--border:#1e2d4a;
  --text:#e2e8f0;--text-dim:#7b8ba5;--text-muted:#4a5568;
  --blue:#3b82f6;--cyan:#06b6d4;--purple:#8b5cf6;--orange:#f59e0b;
  --green:#10b981;--rose:#f43f5e;--pink:#ec4899;--indigo:#6366f1;
  --teal:#14b8a6;--amber:#f59e0b;--lime:#84cc16;--sky:#0ea5e9;
}
body{font-family:'Be Vietnam Pro',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;scroll-behavior:smooth}
::selection{background:rgba(99,102,241,0.3);color:#fff}
.bg-grid{position:fixed;inset:0;background-image:radial-gradient(circle at 1px 1px,rgba(59,130,246,0.04) 1px,transparent 0);background-size:32px 32px;pointer-events:none}
.bg-glow{position:fixed;border-radius:50%;filter:blur(140px);opacity:0.12;pointer-events:none}
.g1{top:-300px;left:-200px;width:700px;height:700px;background:var(--blue)}
.g2{bottom:-300px;right:-200px;width:700px;height:700px;background:var(--purple)}
.g3{top:50%;left:50%;transform:translate(-50%,-50%);width:500px;height:500px;background:var(--cyan);opacity:0.06}
header{position:relative;z-index:10;text-align:center;padding:40px 24px 12px}
header h1{font-size:2.2rem;font-weight:900;letter-spacing:-0.04em;background:linear-gradient(135deg,var(--cyan),var(--blue),var(--purple),var(--pink));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
header .sub{color:var(--text-dim);font-size:0.82rem;font-weight:300;margin-top:6px}
header .date{color:var(--text-muted);font-size:0.68rem;margin-top:4px;font-family:'JetBrains Mono',monospace}
.legend{display:flex;justify-content:center;gap:14px;flex-wrap:wrap;padding:10px 24px 0;position:relative;z-index:10}
.legend-item{display:flex;align-items:center;gap:5px;font-size:0.65rem;color:var(--text-dim)}
.legend-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.container{position:relative;z-index:5;max-width:1500px;margin:0 auto;padding:24px 16px 0}
.section{margin-bottom:28px;opacity:0;transform:translateY(20px);transition:opacity 0.5s,transform 0.5s}
.section.visible{opacity:1;transform:translateY(0)}
.section-header{display:flex;align-items:center;gap:10px;margin-bottom:14px;padding-left:4px}
.section-num{width:32px;height:32px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:0.8rem;font-weight:800;flex-shrink:0}
.section-title{font-size:1.1rem;font-weight:800;letter-spacing:-0.02em}
.section-badge{font-size:0.55rem;font-weight:600;padding:2px 8px;border-radius:8px;text-transform:uppercase;letter-spacing:0.06em}
.card-grid{display:grid;gap:14px}
.grid-2{grid-template-columns:repeat(2,1fr)}
.grid-3{grid-template-columns:repeat(3,1fr)}
.grid-4{grid-template-columns:repeat(4,1fr)}
@media(max-width:1100px){.grid-3,.grid-4{grid-template-columns:repeat(2,1fr)}}
@media(max-width:700px){.grid-2,.grid-3,.grid-4{grid-template-columns:1fr}}
.card{border-radius:14px;padding:18px;position:relative;overflow:hidden;transition:transform 0.25s,box-shadow 0.25s}
.card:hover{transform:translateY(-2px)}
.card::before{content:'';position:absolute;top:0;left:0;width:3px;height:100%;border-radius:3px 0 0 3px}
.card-name{font-size:0.85rem;font-weight:700;margin-bottom:6px;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.card-desc{font-size:0.7rem;color:var(--text-dim);line-height:1.5;margin-bottom:8px}
.card-detail{font-size:0.65rem;color:var(--text-muted);line-height:1.5}
.mono{font-family:'JetBrains Mono',monospace;font-weight:500}
.tag{display:inline-flex;align-items:center;gap:3px;font-family:'JetBrains Mono',monospace;font-size:0.58rem;font-weight:500;padding:2px 7px;border-radius:5px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);color:var(--text-dim);margin-top:4px;margin-right:3px}
.tag-hot{background:rgba(244,63,94,0.15);border-color:rgba(244,63,94,0.3);color:#fda4af;animation:pulse 2s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.6}}
.note{margin-top:6px;padding:8px 10px;background:rgba(245,158,11,0.05);border:1px dashed rgba(245,158,11,0.18);border-radius:7px;font-size:0.65rem;color:#fcd34d;line-height:1.4}
.sub-item{margin-top:6px;padding:8px 10px;background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.05);border-radius:8px}
.sub-item-title{font-size:0.72rem;font-weight:600;margin-bottom:2px}
.sub-item-desc{font-size:0.63rem;color:var(--text-dim);line-height:1.4}
.level-row{display:flex;gap:6px;margin-top:6px;flex-wrap:wrap}
.level-badge{font-size:0.6rem;padding:3px 8px;border-radius:6px;font-weight:600}
.flow-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.flow-step-box{flex:1;min-width:140px;padding:12px;background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.06);border-radius:10px;text-align:center}
.flow-step-num{font-size:0.65rem;font-weight:700;color:var(--orange);margin-bottom:3px}
.flow-step-name{font-size:0.75rem;font-weight:600}
.flow-step-detail{font-size:0.6rem;color:var(--text-dim);margin-top:2px}
.flow-arrow{color:rgba(245,158,11,0.3);font-size:1rem;flex-shrink:0}
.relations{margin-top:28px;padding:20px;background:linear-gradient(135deg,rgba(16,185,129,0.05),rgba(6,182,212,0.03));border:1px solid rgba(16,185,129,0.12);border-radius:16px;opacity:0;transform:translateY(20px);transition:opacity 0.5s,transform 0.5s}
.relations.visible{opacity:1;transform:translateY(0)}
.relations h3{font-size:0.9rem;font-weight:800;color:var(--green);margin-bottom:12px;display:flex;align-items:center;gap:8px}
.rel-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:8px}
.rel-item{display:flex;align-items:center;gap:8px;padding:8px 12px;background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.05);border-radius:8px;font-size:0.7rem}
.rel-from{font-weight:600;color:var(--text);white-space:nowrap}
.rel-arrow{color:var(--green);font-weight:700;flex-shrink:0}
.rel-to{color:var(--text-dim)}
.divider{height:1px;background:linear-gradient(90deg,transparent,rgba(99,102,241,0.15),transparent);margin:20px 0}
footer{position:relative;z-index:10;text-align:center;padding:30px 24px 40px;border-top:1px solid rgba(99,102,241,0.1);opacity:0;transform:translateY(20px);transition:opacity 0.5s,transform 0.5s}
footer.visible{opacity:1;transform:translateY(0)}
#btt{position:fixed;bottom:24px;right:24px;z-index:50;width:42px;height:42px;border-radius:12px;border:1px solid rgba(99,102,241,0.25);background:rgba(13,17,23,0.9);backdrop-filter:blur(8px);color:var(--indigo);font-size:1.1rem;cursor:pointer;opacity:0;transition:opacity 0.3s,transform 0.3s;transform:translateY(8px)}

/* === Dynamic color classes generated per color name === */
</style>
</head>
<body>
<div class="bg-grid"></div>
<div class="bg-glow g1"></div>
<div class="bg-glow g2"></div>
<div class="bg-glow g3"></div>

<header>
  <h1 id="hTitle"></h1>
  <div class="sub" id="hSub"></div>
  <div class="date" id="hDate"></div>
</header>
<div class="legend" id="legend"></div>
<div class="container" id="app"></div>
<button id="btt" onclick="window.scrollTo({top:0,behavior:'smooth'})">↑</button>

<script>
// ============================
// Color system
// ============================
const C={
  blue:{bg:'59,130,246',text:'#93c5fd'},cyan:{bg:'6,182,212',text:'#67e8f9'},
  purple:{bg:'139,92,246',text:'#c4b5fd'},orange:{bg:'245,158,11',text:'#fcd34d'},
  green:{bg:'16,185,129',text:'#6ee7b7'},rose:{bg:'244,63,94',text:'#fda4af'},
  indigo:{bg:'99,102,241',text:'#a5b4fc'},teal:{bg:'20,184,166',text:'#5eead4'},
  sky:{bg:'14,165,233',text:'#7dd3fc'}
};
const cv=(c)=>C[c]||C.blue;
const cardStyle=(c)=>`background:linear-gradient(135deg,rgba(${cv(c).bg},0.07),rgba(${cv(c).bg},0.01));border:1px solid rgba(${cv(c).bg},0.15)`;
const cardBefore=(c)=>`background:rgb(${cv(c).bg})`;
const tagStyle=(c)=>`background:rgba(${cv(c).bg},0.1);border-color:rgba(${cv(c).bg},0.2);color:${cv(c).text}`;

// ============================
// Render engine
// ============================
async function init(){
  const res=await fetch('data.json');
  const D=await res.json();
  
  // Header
  document.getElementById('hTitle').textContent='🧠 '+D.meta.title;
  document.getElementById('hSub').textContent=D.meta.subtitle;
  document.getElementById('hDate').textContent=`Last updated: ${D.meta.lastUpdated} · ${D.meta.updatedBy} · v${D.meta.version}`;
  document.title=D.meta.title;

  // Legend
  const leg=document.getElementById('legend');
  leg.innerHTML=D.legend.map(l=>`<div class="legend-item"><div class="legend-dot" style="background:var(--${l.color})"></div>${l.label}</div>`).join('');

  const app=document.getElementById('app');
  let html='';

  // Sections
  D.sections.forEach((s,si)=>{
    if(si>0) html+='<div class="divider"></div>';
    html+=`<div class="section" data-anim>`;
    html+=`<div class="section-header">`;
    html+=`<div class="section-num" style="background:rgba(${cv(s.color).bg},0.15);color:var(--${s.color})">${s.num}</div>`;
    html+=`<div class="section-title" style="color:var(--${s.color})">${s.title}</div>`;
    if(s.badge) html+=`<span class="section-badge" style="background:rgba(244,63,94,0.15);color:#fda4af">${s.badge}</span>`;
    html+=`</div>`;
    html+=`<div class="card-grid grid-${s.gridCols}">`;
    s.cards.forEach(c=>{html+=renderCard(c,s.color)});
    html+=`</div></div>`;
  });

  // Workflow
  if(D.workflow){
    html+='<div class="divider"></div>';
    html+=`<div class="section" data-anim>`;
    html+=`<div class="section-header">`;
    html+=`<div class="section-num" style="background:rgba(${cv(D.workflow.color).bg},0.15);color:var(--${D.workflow.color})">8</div>`;
    html+=`<div class="section-title" style="color:var(--${D.workflow.color})">${D.workflow.title}</div>`;
    html+=`</div><div class="flow-row">`;
    D.workflow.steps.forEach((st,i)=>{
      if(i>0) html+=`<div class="flow-arrow">→</div>`;
      html+=`<div class="flow-step-box"><div class="flow-step-num">${st.num} ${st.label}</div><div class="flow-step-name">${st.name}</div><div class="flow-step-detail">${st.detail}</div></div>`;
    });
    html+=`</div>`;
    if(D.workflow.note) html+=`<div class="note" style="margin-top:10px">${D.workflow.note}</div>`;
    html+=`</div>`;
  }

  // Relations
  if(D.relations){
    html+='<div class="divider"></div>';
    html+=`<div class="relations" data-anim><h3>🔗 Liên kết chéo giữa các thành phần</h3><div class="rel-grid">`;
    D.relations.forEach(r=>{
      html+=`<div class="rel-item"><span class="rel-from">${r.from}</span><span class="rel-arrow">${r.arrow}</span><span class="rel-to">${r.to}</span></div>`;
    });
    html+=`</div></div>`;
  }

  // Footer
  html+=`<footer data-anim>
    <div style="font-size:0.7rem;color:var(--text-dim);margin-bottom:6px">Tạo bởi <strong style="color:var(--text)">Baron</strong> · Hỗ trợ bởi Claude AI · Data-driven from <span class="mono" style="font-size:0.6rem">data.json</span></div>
    <div style="font-size:0.6rem;color:var(--text-muted)">Cập nhật: ${D.meta.lastUpdated} · v${D.meta.version}</div>
    <div style="margin-top:10px;display:flex;justify-content:center;gap:10px">
      <a href="https://modelcontextprotocol.io" target="_blank" rel="noopener" style="font-size:0.6rem;color:var(--indigo);text-decoration:none;padding:4px 10px;border:1px solid rgba(99,102,241,0.2);border-radius:6px">MCP</a>
      <a href="https://a2a-protocol.org" target="_blank" rel="noopener" style="font-size:0.6rem;color:var(--green);text-decoration:none;padding:4px 10px;border:1px solid rgba(16,185,129,0.2);border-radius:6px">A2A</a>
      <a href="https://github.com/VoltAgent/awesome-agent-skills" target="_blank" rel="noopener" style="font-size:0.6rem;color:var(--teal);text-decoration:none;padding:4px 10px;border:1px solid rgba(20,184,166,0.2);border-radius:6px">Skills</a>
    </div>
  </footer>`;

  app.innerHTML=html;

  // Scroll animations
  const obs=new IntersectionObserver(es=>{es.forEach(e=>{if(e.isIntersecting)e.target.classList.add('visible')})},{threshold:0.08});
  document.querySelectorAll('[data-anim]').forEach(el=>obs.observe(el));
}

function renderCard(c,sectionColor){
  const col=c.tagColor||sectionColor;
  let h=`<div class="card" style="${cardStyle(col)}">`;
  h+=`<div style="position:absolute;top:0;left:0;width:3px;height:100%;border-radius:3px 0 0 3px;${cardBefore(col)}"></div>`;
  h+=`<div class="card-name">`;
  if(c.icon) h+=`<span>${c.icon}</span>`;
  h+=`<span ${c.mono?'class="mono"':''}>${c.name}</span>`;
  if(c.hot) h+=`<span class="tag tag-hot">HOT</span>`;
  if(c.extraBadges) c.extraBadges.forEach(b=>h+=`<span class="tag" style="${tagStyle('green')}">${b}</span>`);
  h+=`</div>`;
  if(c.desc) h+=`<div class="card-desc">${c.desc}</div>`;
  if(c.detail) h+=`<div class="card-detail">${c.detail}</div>`;
  if(c.levels){
    h+=`<div class="level-row">`;
    c.levels.forEach(l=>h+=`<span class="level-badge" style="background:rgba(${cv('cyan').bg},0.15);color:#67e8f9">${l}</span>`);
    h+=`</div>`;
  }
  if(c.subItems){
    c.subItems.forEach(si=>{
      h+=`<div class="sub-item"><div class="sub-item-title">${si.title}</div><div class="sub-item-desc">${si.desc}</div></div>`;
    });
  }
  if(c.tags){
    h+=`<div style="margin-top:6px">`;
    c.tags.forEach(t=>{
      const tc=(c.tagColors&&c.tagColors[t])||col;
      h+=`<span class="tag" style="${tagStyle(tc)}">${t}</span>`;
    });
    h+=`</div>`;
  }
  if(c.note) h+=`<div class="note">${c.note}</div>`;
  h+=`</div>`;
  return h;
}

// Back to top
window.addEventListener('scroll',()=>{
  const b=document.getElementById('btt');
  if(window.scrollY>400){b.style.opacity='1';b.style.transform='translateY(0)'}
  else{b.style.opacity='0';b.style.transform='translateY(8px)'}
});

init();
</script>
</body>
</html>
