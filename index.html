<head>
<meta charset="UTF-8">

<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🧠</text></svg>">

<!-- SEO -->
<meta name="description" content="Bản đồ tương tác hệ sinh thái AI 2026 — protocols, agent frameworks, coding tools, memory systems — curated cho developers Việt Nam.">

<!-- Open Graph -->
<meta property="og:type" content="website">
<meta property="og:title" content="AI Ecosystem Mindmap 2026 — Bản Đồ AI Cho Developers">
<meta property="og:description" content="Khám phá 42+ AI tools & frameworks được chọn lọc cho developers Việt Nam — protocols, agent frameworks, coding tools, memory systems, và trends 2026.">
<meta property="og:url" content="https://ai-mindmap-ochre.vercel.app">
<meta property="og:locale" content="vi_VN">

<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">

<!-- Twitter Card -->
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="AI Ecosystem Mindmap 2026 — Bản Đồ AI Cho Developers">
<meta name="twitter:description" content="42+ AI tools & frameworks curated cho developers Việt Nam.">
<meta name="twitter:image" content="https://ai-mindmap-ochre.vercel.app/og-image.png?v=42">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap">

<style>
/* ═══ CSS Variables ═══ */
:root {
  --bg: #0b1120;
  --sidebar-bg: #0f172a;
  --text: #f1f5f9;
  --text-secondary: #94a3b8;
  --text-muted: #64748b;
  --text-dim: #475569;
  --border: rgba(255,255,255,0.06);
  --hover: rgba(255,255,255,0.04);
  --active: rgba(255,255,255,0.08);
  --card-bg: rgba(255,255,255,0.02);
  --topbar-bg: rgba(15,23,42,0.95);
  --search-bg: #1e293b;
  --scrollbar: #1e293b;
  --selection: #3b82f640;
}

[data-theme="light"] {
  --bg: #f8fafc;
  --sidebar-bg: #ffffff;
  --text: #0f172a;
  --text-secondary: #64748b;
  --text-muted: #94a3b8;
  --text-dim: #cbd5e1;
  --border: rgba(0,0,0,0.07);
  --hover: rgba(0,0,0,0.03);
  --active: rgba(0,0,0,0.04);
  --card-bg: #ffffff;
  --topbar-bg: rgba(255,255,255,0.95);
  --search-bg: #ffffff;
  --scrollbar: #e2e8f0;
  --selection: #3b82f640;
}

/* ═══ Reset & Base ═══ */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  height: 100%;
  font-family: 'Be Vietnam Pro', -apple-system, sans-serif;
  background: var(--bg);
  color: var(--text);
  overflow: hidden;
}
::selection { background: var(--selection); }
::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--scrollbar); border-radius: 99px; }

/* ═══ Animations ═══ */
@keyframes fadeIn { from { opacity: 0 } to { opacity: 1 } }
@keyframes slideUp { from { opacity: 0; transform: translateY(8px) } to { opacity: 1; transform: translateY(0) } }
@keyframes fadeSlide { from { opacity: 0; transform: translateX(6px) } to { opacity: 1; transform: translateX(0) } }

/* ═══ App Layout ═══ */
#app {
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* ═══ Top Bar ═══ */
#topbar {
  height: 48px;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 16px;
  border-bottom: 1px solid var(--border);
  background: var(--topbar-bg);
  backdrop-filter: blur(12px);
  z-index: 100;
}
.topbar-left, .topbar-right {
  display: flex;
  align-items: center;
  gap: 10px;
}
.topbar-left .logo {
  font-size: 14px;
  font-weight: 800;
  letter-spacing: -0.02em;
}
.version-badge {
  font-size: 10px;
  font-weight: 600;
  font-family: 'JetBrains Mono', monospace;
  padding: 2px 7px;
  border-radius: 5px;
  background: var(--hover);
  color: var(--text-muted);
}
#topbar button {
  background: none;
  border: 1px solid var(--border);
  color: var(--text-secondary);
  font-family: 'Be Vietnam Pro', sans-serif;
  font-size: 12px;
  padding: 5px 12px;
  border-radius: 7px;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 6px;
  transition: all 0.2s;
}
#topbar button:hover {
  background: var(--hover);
  border-color: rgba(255,255,255,0.1);
  color: var(--text);
}
#topbar button kbd {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  padding: 1px 5px;
  border-radius: 4px;
  background: var(--hover);
  border: 1px solid var(--border);
  color: var(--text-muted);
}
#sidebar-toggle {
  font-size: 16px;
  padding: 5px 8px !important;
  border: none !important;
}
#theme-toggle {
  font-size: 16px;
  padding: 5px 8px !important;
  border: none !important;
}

/* ═══ Body Container ═══ */
#body-container {
  display: flex;
  flex: 1;
  overflow: hidden;
}

/* ═══ Sidebar ═══ */
#sidebar {
  width: 260px;
  min-width: 260px;
  border-right: 1px solid var(--border);
  background: var(--sidebar-bg);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  transition: width 0.25s ease, min-width 0.25s ease;
}
#sidebar.collapsed {
  width: 0;
  min-width: 0;
  border-right: none;
}
.sidebar-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 16px;
  border-bottom: 1px solid var(--border);
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--text-muted);
}
#total-tools {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  font-weight: 500;
  color: var(--text-dim);
}
#tree-container {
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
}
.sidebar-footer {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 16px;
  border-top: 1px solid var(--border);
  font-size: 11px;
  color: var(--text-dim);
}
.sidebar-footer a {
  color: var(--text-muted);
  text-decoration: none;
  font-size: 11px;
  transition: color 0.2s;
}
.sidebar-footer a:hover {
  color: var(--text);
}

/* ═══ Right Panel ═══ */
#right-panel {
  flex: 1;
  overflow: auto;
  background: var(--bg);
}

/* ═══ Search Modal ═══ */
.hidden { display: none; }
#search-modal {
  position: fixed;
  inset: 0;
  z-index: 300;
  display: flex;
  justify-content: center;
  align-items: flex-start;
  padding-top: min(20vh, 160px);
}
#search-modal.hidden { display: none; }
.search-backdrop {
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,0.6);
  backdrop-filter: blur(8px);
}
.search-dialog {
  position: relative;
  width: 90%;
  max-width: 560px;
  background: var(--search-bg);
  border: 1px solid var(--border);
  border-radius: 14px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.5);
  overflow: hidden;
}
.search-input-wrapper {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 14px 18px;
  border-bottom: 1px solid var(--border);
  font-size: 14px;
}
.search-input-wrapper input {
  flex: 1;
  background: transparent;
  border: none;
  outline: none;
  font-family: 'Be Vietnam Pro', sans-serif;
  font-size: 14px;
  color: var(--text);
}
.search-input-wrapper input::placeholder { color: var(--text-muted); }
.search-input-wrapper kbd {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  padding: 2px 6px;
  border-radius: 4px;
  background: var(--hover);
  border: 1px solid var(--border);
  color: var(--text-muted);
}
#search-results {
  max-height: 400px;
  overflow-y: auto;
}

/* ═══ Responsive ═══ */
@media (max-width: 768px) {
  #sidebar {
    position: fixed;
    top: 48px;
    left: 0;
    bottom: 0;
    z-index: 50;
    width: 260px;
    min-width: 260px;
    transform: translateX(-100%);
    transition: transform 0.25s ease;
  }
  #sidebar.mobile-open {
    transform: translateX(0);
  }
  #sidebar.collapsed {
    transform: translateX(-100%);
  }
}
</style>
</head>
<body>
<div id="app">
  <!-- Top Bar -->
  <header id="topbar">
    <div class="topbar-left">
      <button id="sidebar-toggle" aria-label="Toggle sidebar">☰</button>
      <span class="logo">🧠 AI Mindmap</span>
      <span class="version-badge">v4.0</span>
    </div>
    <div class="topbar-right">
      <button id="search-btn">🔍 Tìm kiếm <kbd>⌘K</kbd></button>
      <button id="theme-toggle" aria-label="Toggle theme">☀️</button>
    </div>
  </header>

  <!-- Body -->
  <div id="body-container">
    <!-- Sidebar -->
    <nav id="sidebar">
      <div class="sidebar-header">
        <span>Explorer</span>
        <span id="total-tools">0 tools</span>
      </div>
      <div id="tree-container">
        <!-- JS sẽ render tree ở đây -->
      </div>
      <div class="sidebar-footer">
        <span>AI Mindmap 2026</span>
        <a href="https://github.com/BARONFANTHE/ai-mindmap" target="_blank" rel="noopener noreferrer">GitHub</a>
      </div>
    </nav>

    <!-- Right Panel -->
    <main id="right-panel">
      <!-- JS sẽ render Welcome / Newspaper / Detail ở đây -->
    </main>
  </div>

  <!-- Search Modal (hidden by default) -->
  <div id="search-modal" class="hidden">
    <div class="search-backdrop"></div>
    <div class="search-dialog">
      <div class="search-input-wrapper">
        🔍 <input id="search-input" placeholder="Tìm kiếm tools..." />
        <kbd>ESC</kbd>
      </div>
      <div id="search-results"></div>
    </div>
  </div>
</div>

<script>
// ═══ Security ═══
function escapeHtml(str) {
  if (typeof str !== 'string') return '';
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#039;');
}

// ═══ State ═══
let data = null;
let selected = null;
let activeSection = null;
let isDark = true;
let sidebarCollapsed = false;

// ═══ Section Colors & Gradients ═══
const iconGradients = {
  'protocols': 'linear-gradient(135deg, #7c3aed 0%, #a78bfa 100%)',
  'frameworks': 'linear-gradient(135deg, #2563eb 0%, #60a5fa 100%)',
  'platforms': 'linear-gradient(135deg, #db2777 0%, #f472b6 100%)',
  'memory': 'linear-gradient(135deg, #0891b2 0%, #22d3ee 100%)',
  'skills': 'linear-gradient(135deg, #ea580c 0%, #fb923c 100%)',
  'orchestration': 'linear-gradient(135deg, #0d9488 0%, #2dd4bf 100%)',
  'coding-agents': 'linear-gradient(135deg, #9333ea 0%, #c084fc 100%)',
  'trends': 'linear-gradient(135deg, #ca8a04 0%, #facc15 100%)',
};

// ═══ Helpers ═══
function isNew(dateStr) {
  if (!dateStr) return false;
  return (Date.now() - new Date(dateStr).getTime()) / 864e5 <= 14;
}

// ═══ Render Functions (stubs — Tasks 2-4 sẽ implement) ═══
function renderTree() {
  const container = document.getElementById('tree-container');
  container.innerHTML = '<div style="padding:20px;color:var(--text-muted);font-size:13px;">Tree sidebar — Task 2</div>';
}

function renderRightPanel() {
  if (selected) {
    renderDetail();
  } else if (activeSection) {
    renderNewspaper();
  } else {
    renderWelcome();
  }
}

function renderWelcome() {
  const panel = document.getElementById('right-panel');
  const totalCards = data.sections.reduce((a, s) => a + s.cards.length, 0);
  panel.innerHTML = `
    <div style="display:flex;align-items:center;justify-content:center;flex-direction:column;gap:20px;height:100%;padding:40px;">
      <div style="font-size:52px;">🧠</div>
      <h2 style="font-size:22px;font-weight:700;margin:0;color:var(--text);letter-spacing:-0.02em;">AI Mindmap 2026</h2>
      <p style="font-size:14px;color:var(--text-muted);text-align:center;line-height:1.6;max-width:360px;">
        Bản đồ AI Ecosystem cho Developers Việt Nam
        <br><span style="font-size:13px;">${totalCards} tools · ${data.sections.length} danh mục</span>
      </p>
      <div style="display:flex;gap:6px;flex-wrap:wrap;justify-content:center;margin-top:8px;">
        ${data.sections.map(s => `<span style="font-size:11px;padding:4px 12px;border-radius:99px;background:${iconGradients[s.id] ? 'var(--hover)' : 'var(--hover)'};border:1px solid var(--border);color:var(--text-secondary);font-weight:500;">${escapeHtml(s.badge || s.title)} ${s.cards.length}</span>`).join('')}
      </div>
      <p style="font-size:12px;color:var(--text-dim);margin-top:8px;">
        ← Chọn danh mục bên trái hoặc <kbd style="padding:1px 6px;border-radius:4px;background:var(--hover);font-size:11px;border:1px solid var(--border);">⌘K</kbd> để tìm kiếm
      </p>
    </div>
  `;
}

function renderNewspaper() {
  const panel = document.getElementById('right-panel');
  panel.innerHTML = '<div style="padding:40px;color:var(--text-muted);font-size:14px;">Newspaper view — Task 3</div>';
}

function renderDetail() {
  const panel = document.getElementById('right-panel');
  panel.innerHTML = '<div style="padding:40px;color:var(--text-muted);font-size:14px;">Detail view — Task 4</div>';
}

// ═══ Event Handlers ═══
function toggleSidebar() {
  sidebarCollapsed = !sidebarCollapsed;
  const sidebar = document.getElementById('sidebar');
  if (window.innerWidth <= 768) {
    sidebar.classList.toggle('mobile-open', !sidebarCollapsed);
    sidebar.classList.toggle('collapsed', sidebarCollapsed);
  } else {
    sidebar.classList.toggle('collapsed', sidebarCollapsed);
  }
}

function openSearch() {
  document.getElementById('search-modal').classList.remove('hidden');
  setTimeout(() => document.getElementById('search-input').focus(), 50);
}

function closeSearch() {
  document.getElementById('search-modal').classList.add('hidden');
  document.getElementById('search-input').value = '';
  document.getElementById('search-results').innerHTML = '';
}

// ═══ Init ═══
async function init() {
  try {
    const res = await fetch('data.json');
    data = await res.json();

    // Update total tools count
    const total = data.sections.reduce((a, s) => a + s.cards.length, 0);
    document.getElementById('total-tools').textContent = total + ' tools';

    // Render
    renderTree();
    renderRightPanel();

    // Event listeners
    document.getElementById('sidebar-toggle').addEventListener('click', toggleSidebar);
    document.getElementById('search-btn').addEventListener('click', openSearch);
    document.getElementById('theme-toggle').addEventListener('click', () => {
      isDark = !isDark;
      document.documentElement.setAttribute('data-theme', isDark ? '' : 'light');
      document.getElementById('theme-toggle').textContent = isDark ? '☀️' : '🌙';
    });

    // Keyboard shortcuts
    document.addEventListener('keydown', (e) => {
      if ((e.ctrlKey || e.metaKey) && e.key === 'k') {
        e.preventDefault();
        openSearch();
      }
      if (e.key === 'Escape') closeSearch();
    });

    // Search backdrop click
    document.querySelector('.search-backdrop')?.addEventListener('click', closeSearch);

  } catch (err) {
    console.error('Failed to load data.json:', err);
  }
}

document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
